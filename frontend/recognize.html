<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车牌识别 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <h2>Smart Parking</h2>
                <p>智慧停车管理系统</p>
            </div>
            <div class="sidebar-nav">
                <a class="nav-item" id="nav-dashboard" href="/dashboard.html">
                    <span class="icon">&#9776;</span> 主面板
                </a>
                <a class="nav-item" id="nav-parking" href="/parking.html">
                    <span class="icon">&#127359;</span> 停车场
                </a>
                <a class="nav-item" id="nav-checkin" href="/checkin.html">
                    <span class="icon">&#9971;</span> 车辆入库
                </a>
                <a class="nav-item" id="nav-user-checkin" href="/user-checkin.html">
                    <span class="icon">&#128664;</span> 智能入库
                </a>
                <a class="nav-item" id="nav-vehicles" href="/vehicles.html">
                    <span class="icon">&#128663;</span> 车辆信息
                </a>
                <a class="nav-item" id="nav-billing" href="/billing-rules.html">
                    <span class="icon">&#128176;</span> 计费规则
                </a>
                <a class="nav-item" id="nav-admin" href="/admin.html">
                    <span class="icon">&#128100;</span> 管理页面
                </a>
                <a class="nav-item" id="nav-reservation" href="/reservation.html">
                    <span class="icon">&#128197;</span> 预约管理
                </a>
                <a class="nav-item" id="nav-recognize" href="/recognize.html">
                    <span class="icon">&#128247;</span> 车牌识别
                </a>
                <a class="nav-item" id="nav-profile" href="/profile.html">
                    <span class="icon">&#128101;</span> 个人中心
                </a>
                <a class="nav-item" id="nav-chat" href="/chat.html">
                    <span class="icon">&#128172;</span> 联系客服
                </a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                    <div>
                        <div class="user-name">用户</div>
                        <div class="user-role">普通用户</div>
                    </div>
                </div>
                <button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <h1>车牌识别</h1>
                <p>使用摄像头识别车牌号，并与系统已登记车辆进行比对</p>
            </div>

            <div class="row">
                <div class="col-2">
                    <!-- Camera Card -->
                    <div class="card">
                        <div class="card-title">摄像头</div>
                        <div id="camera-container" style="text-align:center;background:#000;border-radius:8px;overflow:hidden;min-height:320px;display:flex;align-items:center;justify-content:center">
                            <video id="camera-preview" autoplay playsinline style="max-width:100%;max-height:400px;display:none"></video>
                            <img id="upload-preview" alt="" style="max-width:100%;max-height:400px;display:none;object-fit:contain">
                            <p id="camera-placeholder" style="color:#999;font-size:14px">点击下方按钮开启摄像头，或上传车牌图片进行识别</p>
                        </div>
                        <div class="actions mt-2" style="display:flex;gap:10px;flex-wrap:wrap">
                            <button class="btn btn-primary" id="btn-start-camera" onclick="startCamera()">开启摄像头</button>
                            <button class="btn btn-success" id="btn-capture" onclick="captureAndRecognize()" disabled>拍照识别</button>
                            <button class="btn btn-default" id="btn-stop-camera" onclick="stopCamera()" disabled>关闭摄像头</button>
                            <button class="btn btn-primary" id="btn-upload" onclick="document.getElementById('upload-input').click()">📁 上传图片识别</button>
                            <input type="file" id="upload-input" accept="image/*" style="display:none" onchange="uploadAndRecognize(event)">
                        </div>
                    </div>

                    <!-- Recent captures -->
                    <div class="card">
                        <div class="card-title">识别记录</div>
                        <div id="history-container">
                            <p style="color:#999;font-size:13px">暂无识别记录</p>
                        </div>
                    </div>
                </div>

                <div class="col-1">
                    <!-- Recognition Result -->
                    <div class="card">
                        <div class="card-title">识别结果</div>
                        <div id="result-container">
                            <div id="result-placeholder" style="text-align:center;padding:40px 0;color:#999">
                                <p style="font-size:48px;margin-bottom:12px">&#128247;</p>
                                <p>等待识别...</p>
                            </div>
                            <div id="result-content" style="display:none">
                                <div id="result-alert"></div>
                                <div class="form-group">
                                    <label>识别车牌号</label>
                                    <div style="font-size:28px;font-weight:bold;letter-spacing:4px;padding:10px;background:#f5f5f5;border-radius:6px;text-align:center" id="result-plate">-</div>
                                </div>
                                <div class="form-group">
                                    <label>置信度</label>
                                    <div id="result-confidence">-</div>
                                </div>
                                <div class="form-group">
                                    <label>车牌颜色</label>
                                    <div id="result-color">-</div>
                                </div>
                                <div style="border-top:1px solid #e8e8e8;padding-top:16px;margin-top:16px">
                                    <h4 style="margin-bottom:12px;font-size:15px">登记信息</h4>
                                    <div id="registration-info">
                                        <p style="color:#999">正在查询...</p>
                                    </div>
                                </div>
                                <div class="actions mt-2" id="result-actions" style="display:none">
                                    <button class="btn btn-primary" id="btn-quick-checkin" onclick="quickCheckin()">快速入库</button>
                                    <button class="btn btn-danger" id="btn-quick-checkout" onclick="quickCheckout()">快速出库</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Manual Check -->
                    <div class="card">
                        <div class="card-title">手动查询</div>
                        <p style="color:#666;font-size:13px;margin-bottom:10px">手动输入车牌号查询登记状态</p>
                        <div class="form-row" style="gap:6px">
                            <input type="text" id="manual-plate-input" class="form-control" placeholder="输入车牌号（如京A12345）" maxlength="10" style="flex:1">
                            <button class="btn btn-primary" onclick="manualCheck()">查询</button>
                        </div>
                        <div id="manual-result" style="margin-top:10px"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/recognize.js"></script>
</body>
</html>
