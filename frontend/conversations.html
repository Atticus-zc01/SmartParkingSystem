<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服会话 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-logo"><h2>Smart Parking</h2><p>智慧停车管理系统</p></div>
        <div class="sidebar-nav">
            <a class="nav-item" id="nav-dashboard" href="/dashboard.html"><span class="icon">&#9776;</span> 主面板</a>
            <a class="nav-item" id="nav-parking" href="/parking.html"><span class="icon">&#127359;</span> 停车场</a>
            <a class="nav-item" id="nav-checkin" href="/checkin.html"><span class="icon">&#9971;</span> 车辆入库</a>
            <a class="nav-item" id="nav-user-checkin" href="/user-checkin.html"><span class="icon">&#128664;</span> 智能入库</a>
            <a class="nav-item" id="nav-vehicles" href="/vehicles.html"><span class="icon">&#128663;</span> 车辆信息</a>
            <a class="nav-item" id="nav-billing" href="/billing-rules.html"><span class="icon">&#128176;</span> 计费规则</a>
            <a class="nav-item" id="nav-admin" href="/admin.html"><span class="icon">&#128100;</span> 管理页面</a>
            <a class="nav-item" id="nav-reservation" href="/reservation.html"><span class="icon">&#128197;</span> 预约管理</a>
            <a class="nav-item" id="nav-recognize" href="/recognize.html"><span class="icon">&#128247;</span> 车牌识别</a>
            <a class="nav-item" id="nav-profile" href="/profile.html"><span class="icon">&#128101;</span> 个人中心</a>
            <a class="nav-item active" id="nav-chat" href="/conversations.html"><span class="icon">&#128172;</span> 客服会话</a>
        </div>
        <div class="sidebar-footer">
            <div class="user-info"><div class="user-avatar">U</div><div><div class="user-name">用户</div><div class="user-role">普通用户</div></div></div>
            <button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header"><h1>客服会话</h1><p>查看所有用户与 AI / 人工客服的对话，转人工的会话会高亮提醒</p></div>
        <div id="cs-perm"></div>

        <div class="cs-admin" id="cs-admin" style="display:none">
            <!-- left: conversation list -->
            <div class="cs-admin-list">
                <div class="lst-head"><span>会话列表</span><span id="cs-count" style="font-weight:400;color:#999;font-size:12px"></span></div>
                <div class="cs-filter">
                    <div class="f active" data-f="active" onclick="setFilter('active')">全部</div>
                    <div class="f" data-f="escalated" onclick="setFilter('escalated')">待处理</div>
                </div>
                <div class="cs-list-scroll" id="cs-list"><div class="cs-empty">加载中…</div></div>
            </div>

            <!-- right: transcript -->
            <div class="cs-admin-main">
                <div id="cs-detail">
                    <div class="cs-empty">请从左侧选择一个会话查看详情</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/conversations.js"></script>
</body>
</html>
