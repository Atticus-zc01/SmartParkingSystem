<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>联系客服 - Smart Parking</title><link rel="stylesheet" href="/css/style.css">
<style>
.chat-container { display:flex; flex-direction:column; height:calc(100vh - 240px); border:1px solid #e8e8e8; border-radius:8px; background:#fff; }
.chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
.chat-bubble { max-width:70%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5; word-break:break-word; }
.chat-bubble.sent { background:#00aa7f; color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.chat-bubble.received { background:#f0f0f0; color:#333; align-self:flex-start; border-bottom-left-radius:4px; }
.chat-time { font-size:11px; color:#999; text-align:center; padding:4px 0; }
.chat-input-bar { display:flex; gap:8px; padding:12px 16px; border-top:1px solid #e8e8e8; background:#fafafa; border-radius:0 0 8px 8px; }
.chat-input-bar input { flex:1; }
.empty-chat { text-align:center; color:#999; padding:40px 20px; }
</style>
</head>
<body>
<div class="app-container">
<div class="sidebar">
<div class="sidebar-logo"><h2>Smart Parking</h2><p>智慧停车管理系统</p></div>
<div class="sidebar-nav">
<a class="nav-item" id="nav-dashboard" href="/dashboard.html"><span class="icon">&#9776;</span> 主面板</a>
<a class="nav-item" id="nav-parking" href="/parking.html"><span class="icon">&#127359;</span> 停车场</a>
<a class="nav-item" id="nav-checkin" href="/checkin.html"><span class="icon">&#9971;</span> 车辆入库</a>
<a class="nav-item" id="nav-vehicles" href="/vehicles.html"><span class="icon">&#128663;</span> 车辆信息</a>
<a class="nav-item" id="nav-admin" href="/admin.html"><span class="icon">&#128100;</span> 管理页面</a>
<a class="nav-item" id="nav-reservation" href="/reservation.html"><span class="icon">&#128197;</span> 预约管理</a>
<a class="nav-item" id="nav-recognize" href="/recognize.html"><span class="icon">&#128247;</span> 车牌识别</a>
<a class="nav-item" id="nav-profile" href="/profile.html"><span class="icon">&#128101;</span> 个人中心</a>
<a class="nav-item active" id="nav-chat" href="/chat.html"><span class="icon">&#128172;</span> 联系客服</a>
</div>
<div class="sidebar-footer">
<div class="user-info"><div class="user-avatar">U</div><div><div class="user-name">用户</div><div class="user-role">普通用户</div></div></div>
<button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
</div>
</div>
<div class="main-content">
<div class="page-header"><h1>联系客服</h1><p>与客服人员在线沟通</p></div>
<div class="chat-container">
<div class="chat-messages" id="chat-messages">
<div class="empty-chat">加载中...</div>
</div>
<div class="chat-input-bar">
<input type="text" id="chat-input" class="form-control" placeholder="输入消息内容..." maxlength="500">
<button class="btn btn-primary" onclick="sendChatMessage()">发送</button>
</div>
</div>
</div>
</div>
<script src="/js/common.js"></script>
<script>
const user = checkAuth();
if (user) initSidebar();

let chatPollTimer = null;

async function loadMessages() {
    const res = await get('/api/message/history?user_id=0');
    const container = document.getElementById('chat-messages');
    if (!res || !res.ok) { container.innerHTML = '<div class="empty-chat">加载失败</div>'; return; }
    const messages = res.data.messages || [];
    if (messages.length === 0) {
        container.innerHTML = '<div class="empty-chat">暂无消息，发送一条消息开始对话吧</div>';
        return;
    }
    let html = '';
    let lastDate = '';
    messages.forEach(m => {
        const date = (m.created_at || '').split(' ')[0];
        const time = (m.created_at || '').split(' ')[1] || '';
        if (date && date !== lastDate) {
            html += `<div class="chat-time">${date}</div>`;
            lastDate = date;
        }
        const isSent = m.sender_id === user.id;
        html += `<div class="chat-bubble ${isSent ? 'sent' : 'received'}">${escapeHtml(m.content)}<div style="font-size:10px;margin-top:2px;opacity:0.7">${time.substring(0,5)}</div></div>`;
    });
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    const res = await post('/api/message/send', { receiver_id: 0, content });
    if (res && res.ok) {
        loadMessages();
    } else {
        showError && showError('发送失败: ' + (res?.data?.error || '未知错误'));
    }
}

document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
});

loadMessages();
chatPollTimer = setInterval(loadMessages, 3000);
</script>
</body>
</html>
